name: Deploy to Vercel (Prebuilt)

on:
  push:
    branches:
      - canary
  workflow_dispatch:
  workflow_run:
    workflows: ["Upstream Sync"]
    types:
      - completed

concurrency:
  group: deploy-vercel-${{ github.event_name }}-${{ github.ref || github.event.workflow_run.head_branch || 'canary' }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  Deploy-to-Vercel:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'canary' || '' }}

      - name: 2. Setup PNPM
        uses: pnpm/action-setup@v4

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: 'pnpm'

      - name: 4. Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 5. Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 6. Pull Vercel Environment
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 7. Build Project Artifacts
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 8. Deploy to Vercel
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
